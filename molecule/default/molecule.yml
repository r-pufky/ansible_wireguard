---
###############################################################################
# Default
###############################################################################
# Default configuration is deployed successfully. Network level testing
# requires VMs for kernel namespace and systemd networking without affecting
# host.
#
# Invalid wireguard configs (e.g. user error in adapter configuration) are not
# tested; only that settings as specified are deployed correctly.
#
# Keys are well-known example keys from wireguard-initramfs.
#
# Tests:
# * initramfs not installed.
# * Wireguard packages are installed, no adapters created.
# * confirm that template renders are correct.

dependency:
  name: 'galaxy'
driver:
  name: 'vagrant'
  provider:
    name: 'libvirt'
    type: 'libvirt'
provisioner:
  name: 'ansible'
  connection_options:
    ansible_ssh_user: 'vagrant'
    ansible_become: true
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
  inventory:
    group_vars:
      all:
        url_inject_enable: true
        wireguard_flg_initramfs: true
        wireguard_srv_ipv4_forwarding: true
        wireguard_srv_ipv6_forwarding: true
        wireguard_cfg_initramfs_adapter: 'example_enabled'
        wireguard_cfg_adapters:
          - name: 'example_enabled'
            state: 'enabled'
            private_key: 'iMgmYiJ5KykymUlWO/qtaC1azuFqH3zKSxs+dEgDRmI='
            address:
              - '172.31.255.10/24'
            save_config: false
            peers:
              - public_key: 'gyW39I9bAiOBXyhL8LWw9qwiTZgMmtAbsWtLUv8uKTc='
                preshared_key: 'xZOa9wXPCL86UtIEMc4kKwj/wsCohs+S9NexPLDaFwU='
                allowed_ips:
                  - '172.31.255.254/32'
                endpoint:
                  host: '127.0.0.1'
                  port: 51820
                persistent_keepalive: 25
          - name: 'example_present'
            state: 'present'
            private_key: 'iMgmYiJ5KykymUlWO/qtaC1azuFqH3zKSxs+dEgDRmI='
            address:
              - '172.31.255.10/24'
            save_config: false
            peers:
              - public_key: 'gyW39I9bAiOBXyhL8LWw9qwiTZgMmtAbsWtLUv8uKTc='
                preshared_key: 'xZOa9wXPCL86UtIEMc4kKwj/wsCohs+S9NexPLDaFwU='
                allowed_ips:
                  - '172.31.255.254/32'
                endpoint:
                  host: '127.0.0.1'
                  port: 51820
                persistent_keepalive: 25
          - name: 'example_no_endpoint'
            state: 'present'
            private_key: 'iMgmYiJ5KykymUlWO/qtaC1azuFqH3zKSxs+dEgDRmI='
            address:
              - '172.31.255.10/24'
            save_config: false
            peers:
              - public_key: 'gyW39I9bAiOBXyhL8LWw9qwiTZgMmtAbsWtLUv8uKTc='
                preshared_key: 'xZOa9wXPCL86UtIEMc4kKwj/wsCohs+S9NexPLDaFwU='
                allowed_ips:
                  - '172.31.255.254/32'
                persistent_keepalive: 25
          - name: 'example_disabled'
            state: 'disabled'
            private_key: 'iMgmYiJ5KykymUlWO/qtaC1azuFqH3zKSxs+dEgDRmI='
            address:
              - '172.31.255.10/24'
          - name: 'example_absent'
            state: 'absent'
            private_key: 'iMgmYiJ5KykymUlWO/qtaC1azuFqH3zKSxs+dEgDRmI='
platforms:
  - name: 'wireguard-default'
    box: 'debian/trixie64'
    memory: 4096
    cpus: 2
    interfaces:
      - network_name: 'private_network'
        auto_config: true
        type: 'dhcp'
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'

---
###############################################################################
# Configure Wireguard Adapter
###############################################################################
# Sanitize adapter config and render template to remote host. Manager adapter
# state for specified adapters:
# * disabled - Down only.
# * enabled - Set config and up.
# * present - Set config only.
# * absent - Down and remove config.
#
# Args:
#   adapter: dict - wireguard_cfg_adapters item.
#
# Reference:
# * https://manpages.debian.org/unstable/wireguard-tools/wg-quick.8.en.html
# * https://manpages.debian.org/unstable/wireguard-tools/wg.8.en.html

- name: 'Adapter | assert | required options'
  ansible.builtin.assert:
    quiet: true
    that:
      - adapter.name | length > 0
      - adapter.private_key | length > 0
    fail_msg: |

      ✘ Adapter must have name and private_key defined.

      {{ adapter }}

- name: 'Adapter | fact | parse adapter location'
  ansible.builtin.set_fact:
    wireguard__adapter_file:
      '{{ wireguard___app._etc_dir ~ "/" ~ adapter.name ~ ".conf" }}'

- name: '{{ "Adapter | wg | stop " ~ adapter.name }}'
  when: adapter.state == 'disabled' or adapter.state == 'absent'
  ansible.builtin.command: '{{ "wg-quick down " ~ adapter.name }}'
  changed_when: false
  failed_when: false

- name: '{{ "Adapter | filesystem | remove " ~ wireguard__adapter_file }}'
  when: adapter.state == 'absent'
  ansible.builtin.file:
    path: '{{ wireguard__adapter_file }}'
    state: 'absent'

- name: '{{  "Adapter | filesystem | set " ~ wireguard__adapter_file }}'
  when: adapter.state == 'present' or adapter.state == 'enabled'
  ansible.builtin.template:
    src: 'adapter.j2'
    dest: '{{ wireguard__adapter_file }}'
    owner: 'root'
    group: 'root'
    mode: '0600'
  register: wireguard__adapter
  no_log: true  # Private keys.

- name: 'Adapter | systemd | restart {{ adapter.name }}'
  when: wireguard__adapter.changed and adapter.state == 'enabled'
  ansible.builtin.systemd:
    name: 'wg-quick@{{ adapter.name }}'
    state: 'restarted'
    enabled: true

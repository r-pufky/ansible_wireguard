---
###############################################################################
# Wireguard Handlers
###############################################################################

- name: 'Handlers | cmd | update-initramfs'
  listen: 'Handlers | update | wireguard'
  ansible.builtin.command: 'update-initramfs -u'
  changed_when: true

- name: 'Handlers | cmd | update-grub'
  listen: 'Handlers | update | wireguard'
  ansible.builtin.command: 'update-grub'
  changed_when: true
